

<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.wrap{padding:1rem 0}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.sec{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.row label{font-size:12px;color:var(--color-text-secondary);min-width:72px;flex-shrink:0}
input[type=text],input[type=password]{flex:1;min-width:0;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-mono)}
select{padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-mono)}
textarea{width:100%;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:12px;font-family:var(--font-mono);resize:vertical;line-height:1.5}
button{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
button:hover{background:var(--color-background-tertiary)}
button:active{transform:scale(.98)}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.btn-danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.btn-success{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.log{font-family:var(--font-mono);font-size:12px;padding:8px 12px;border-radius:var(--border-radius-md);background:var(--color-background-tertiary);color:var(--color-text-secondary);border-left:3px solid var(--color-border-tertiary);margin-top:8px;min-height:30px;white-space:pre-wrap;word-break:break-all}
.log.ok{border-color:#1D9E75;color:var(--color-text-success)}
.log.err{border-color:#E24B4A;color:var(--color-text-danger)}
.log.info{border-color:#378ADD;color:var(--color-text-info)}
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1rem}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px}
.tab.active{color:var(--color-text-info);border-bottom-color:#378ADD}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:12px;background:var(--color-background-secondary);color:var(--color-text-primary);display:flex;align-items:center;gap:5px}
.chip.active{border-color:#378ADD;color:#0C447C;background:#E6F1FB}
.chip-del{color:var(--color-text-danger);cursor:pointer;font-size:15px;line-height:1;margin-left:2px}
.btn-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
hr{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0}
.new-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
</style>

<div class="wrap">
<h2 class="sr-only">Dataset CRUD via GitHub API</h2>

<div class="tab-bar">
  <div class="tab active" id="tab-config" onclick="goTab('config')"><i class="ti ti-settings" aria-hidden="true"></i> Config</div>
  <div class="tab" id="tab-files" onclick="goTab('files')"><i class="ti ti-folder" aria-hidden="true"></i> Files</div>
  <div class="tab" id="tab-editor" onclick="goTab('editor')"><i class="ti ti-edit" aria-hidden="true"></i> Editor</div>
</div>

<div id="pane-config">
  <div class="card">
    <div class="sec"><i class="ti ti-brand-github" aria-hidden="true"></i> GitHub connection</div>
    <div class="row"><label>Token</label><input type="password" id="gh-token" placeholder="ghp_xxx  atau  github_pat_xxx"></div>
    <div class="row"><label>Owner</label><input type="text" id="gh-owner" placeholder="sismadi"></div>
    <div class="row"><label>Repo</label><input type="text" id="gh-repo" placeholder="wawan.sismadi.com"></div>
    <div class="row"><label>Branch</label><input type="text" id="gh-branch" placeholder="main" value="main"></div>
    <div class="row"><label>Path</label><input type="text" id="gh-path" placeholder="pages" value="pages"></div>
    <div class="btn-bar">
      <button class="btn-primary" onclick="saveAndTest()"><i class="ti ti-plug" aria-hidden="true"></i> Simpan & Test</button>
    </div>
    <div class="log info" id="log-config">Isi form lalu klik Simpan & Test.</div>
  </div>

  <div class="card">
    <div class="sec"><i class="ti ti-list" aria-hidden="true"></i> Manifest — pages/index.js</div>
    <div id="manifest-chips" class="chips"><span style="font-size:12px;color:var(--color-text-secondary)">Belum dimuat</span></div>
    <div class="btn-bar">
      <button onclick="fetchManifest()"><i class="ti ti-refresh" aria-hidden="true"></i> Load manifest</button>
    </div>
    <div class="log" id="log-manifest">—</div>
  </div>
</div>

<div id="pane-files" style="display:none">
  <div class="card">
    <div class="sec"><i class="ti ti-folder-open" aria-hidden="true"></i> File di folder /pages</div>
    <div id="file-chips" class="chips"><span style="font-size:12px;color:var(--color-text-secondary)">Klik Refresh untuk memuat</span></div>
    <div class="btn-bar">
      <button onclick="fetchFileList()"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
    </div>
    <div class="log" id="log-files">—</div>
  </div>

  <div class="card">
    <div class="sec"><i class="ti ti-plus" aria-hidden="true"></i> Tambah halaman baru</div>
    <div class="new-row">
      <label style="font-size:12px;color:var(--color-text-secondary);min-width:72px">Nama key</label>
      <input type="text" id="new-key" placeholder="expertise" style="width:160px;flex:none">
      <button class="btn-success" onclick="createPage()"><i class="ti ti-plus" aria-hidden="true"></i> Buat</button>
    </div>
    <div class="log" id="log-create">—</div>
  </div>
</div>

<div id="pane-editor" style="display:none">
  <div class="card">
    <div class="sec"><i class="ti ti-edit" aria-hidden="true"></i> Edit file</div>
    <div class="row">
      <label>File</label>
      <select id="editor-select" style="flex:1" onchange="loadFile(this.value)">
        <option value="">— pilih file —</option>
      </select>
      <button onclick="refreshEditor()" aria-label="refresh"><i class="ti ti-refresh" aria-hidden="true"></i></button>
    </div>
    <div class="row">
      <label>Commit</label>
      <input type="text" id="commit-msg" placeholder="Update pages/home.js">
    </div>
    <textarea id="editor-area" rows="18" spellcheck="false" placeholder="Pilih file di atas untuk memuat konten..."></textarea>
    <div class="btn-bar">
      <button class="btn-primary" onclick="commitFile()"><i class="ti ti-cloud-upload" aria-hidden="true"></i> Commit</button>
      <button onclick="downloadFile()"><i class="ti ti-download" aria-hidden="true"></i> Download</button>
      <button class="btn-danger" onclick="deleteFile()"><i class="ti ti-trash" aria-hidden="true"></i> Hapus</button>
    </div>
    <div class="log" id="log-editor">Pilih file dari dropdown untuk mulai edit.</div>
  </div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const cfg={token:'',owner:'',repo:'',branch:'main',path:'pages'};
const shas={};
let manifestKeys=[];
let fileList=[];

function goTab(t){
  ['config','files','editor'].forEach(x=>{
    $('pane-'+x).style.display=x===t?'':'none';
    $('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='editor' && fileList.length===0 && cfg.token) refreshEditor();
  if(t==='files' && fileList.length===0 && cfg.token) fetchFileList();
}

function readCfg(){
  cfg.token=$('gh-token').value.trim();
  cfg.owner=$('gh-owner').value.trim();
  cfg.repo=$('gh-repo').value.trim();
  cfg.branch=$('gh-branch').value.trim()||'main';
  cfg.path=$('gh-path').value.trim().replace(/\/$/,'')||'pages';
}

function setLog(id,msg,type=''){
  const el=$(id);
  if(!el)return;
  el.textContent=msg;
  el.className='log'+(type?' '+type:'');
}

async function ghFetch(endpoint,method='GET',body=null){
  const h={'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  const opts={method,headers:h};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch('https://api.github.com'+endpoint,opts);
  const data=await res.json();
  if(!res.ok) throw new Error(data.message||('HTTP '+res.status));
  return data;
}

async function saveAndTest(){
  readCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo){setLog('log-config','✗ Token, owner, dan repo wajib diisi.','err');return;}
  setLog('log-config','Menghubungkan...','info');
  try{
    const d=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo);
    setLog('log-config','✓ Terhubung: '+d.full_name+' ('+(d.private?'private':'public')+') — branch: '+cfg.branch,'ok');
  }catch(e){setLog('log-config','✗ '+e.message,'err');}
}

async function fetchManifest(){
  readCfg();
  if(!cfg.token){setLog('log-manifest','✗ Isi dan test config dulu.','err');return;}
  setLog('log-manifest','Memuat manifest...','info');
  try{
    const d=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/index.js?ref='+cfg.branch);
    const raw=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    shas['index.js']=d.sha;
    const m=raw.match(/pageFiles\s*=\s*(\[[\s\S]*?\])/);
    if(!m) throw new Error('Format pageFiles tidak ditemukan di index.js');
    manifestKeys=new Function('return '+m[1])();
    renderManifestChips();
    setLog('log-manifest','✓ '+manifestKeys.length+' halaman: '+manifestKeys.join(', '),'ok');
  }catch(e){setLog('log-manifest','✗ '+e.message,'err');}
}

function renderManifestChips(){
  $('manifest-chips').innerHTML=manifestKeys.length
    ?manifestKeys.map(k=>`<span class="chip active"><i class="ti ti-file-code" aria-hidden="true"></i>${k}.js</span>`).join('')
    :'<span style="font-size:12px;color:var(--color-text-secondary)">Manifest kosong</span>';
}

async function fetchFileList(){
  readCfg();
  if(!cfg.token){setLog('log-files','✗ Isi dan test config dulu.','err');return;}
  setLog('log-files','Memuat daftar file...','info');
  try{
    const data=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'?ref='+cfg.branch);
    fileList=data.filter(f=>f.name.endsWith('.js')&&f.name!=='index.js');
    fileList.forEach(f=>{shas[f.name]=f.sha;});
    renderFileChips();
    populateEditorSelect();
    setLog('log-files','✓ '+fileList.length+' file ditemukan.','ok');
  }catch(e){setLog('log-files','✗ '+e.message,'err');}
}

function renderFileChips(){
  $('file-chips').innerHTML=fileList.length
    ?fileList.map(f=>`<span class="chip">
        <i class="ti ti-file-code" aria-hidden="true"></i>${f.name}
        <span class="chip-del" onclick="quickDelete('${f.name}')" title="Hapus">×</span>
      </span>`).join('')
    :'<span style="font-size:12px;color:var(--color-text-secondary)">Tidak ada file</span>';
}

function populateEditorSelect(){
  const sel=$('editor-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">— pilih file —</option>'+
    fileList.map(f=>`<option value="${f.name}">${f.name}</option>`).join('');
  if(cur && fileList.find(f=>f.name===cur)) sel.value=cur;
}

async function refreshEditor(){
  readCfg();
  if(!cfg.token){setLog('log-editor','✗ Isi dan test config dulu.','err');return;}
  setLog('log-editor','Memuat daftar file...','info');
  try{
    const data=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'?ref='+cfg.branch);
    fileList=data.filter(f=>f.name.endsWith('.js')&&f.name!=='index.js');
    fileList.forEach(f=>{shas[f.name]=f.sha;});
    populateEditorSelect();
    setLog('log-editor','✓ '+fileList.length+' file dimuat. Pilih file dari dropdown.','ok');
  }catch(e){setLog('log-editor','✗ '+e.message,'err');}
}

async function loadFile(filename){
  if(!filename) return;
  $('commit-msg').value='Update '+cfg.path+'/'+filename;
  setLog('log-editor','Memuat '+filename+'...','info');
  try{
    const d=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/'+filename+'?ref='+cfg.branch);
    shas[filename]=d.sha;
    $('editor-area').value=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    setLog('log-editor','✓ '+filename+' dimuat ('+d.size+' bytes)','ok');
  }catch(e){setLog('log-editor','✗ '+e.message,'err');}
}

function makePageContent(key){
  const cap=key.charAt(0).toUpperCase()+key.slice(1);
  return `pages.${key} = [\n    {\n        section: 'titleHero',\n        title: '${cap}',\n        description: 'Deskripsi halaman ${key}.'\n    }\n];\n`;
}

function makeManifestContent(keys){
  return `const pageFiles = ${JSON.stringify(keys,null,4)};\n`;
}

async function updateManifest(msg){
  const content=btoa(unescape(encodeURIComponent(makeManifestContent(manifestKeys))));
  const body={message:msg,content,branch:cfg.branch};
  if(shas['index.js']) body.sha=shas['index.js'];
  const d=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/index.js','PUT',body);
  shas['index.js']=d.content.sha;
}

async function createPage(){
  readCfg();
  const key=$('new-key').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!key){setLog('log-create','✗ Nama key tidak valid.','err');return;}
  if(manifestKeys.includes(key)){setLog('log-create','✗ "'+key+'" sudah ada di manifest.','err');return;}
  setLog('log-create','Membuat '+key+'.js...','info');
  try{
    const content=btoa(unescape(encodeURIComponent(makePageContent(key))));
    await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/'+key+'.js','PUT',{
      message:'feat: tambah halaman '+key,content,branch:cfg.branch
    });
    manifestKeys.push(key);
    await updateManifest('feat: tambah '+key+' ke manifest');
    $('new-key').value='';
    setLog('log-create','✓ '+key+'.js dibuat & manifest diperbarui.','ok');
    renderManifestChips();
    await fetchFileList();
  }catch(e){setLog('log-create','✗ '+e.message,'err');}
}

async function commitFile(){
  readCfg();
  const filename=$('editor-select').value;
  if(!filename){setLog('log-editor','✗ Pilih file terlebih dahulu.','err');return;}
  const content=btoa(unescape(encodeURIComponent($('editor-area').value)));
  const msg=$('commit-msg').value||'Update '+filename;
  setLog('log-editor','Meng-commit '+filename+'...','info');
  try{
    const body={message:msg,content,branch:cfg.branch};
    if(shas[filename]) body.sha=shas[filename];
    const d=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/'+filename,'PUT',body);
    shas[filename]=d.content.sha;
    setLog('log-editor','✓ Committed: '+filename,'ok');
  }catch(e){setLog('log-editor','✗ '+e.message,'err');}
}

function downloadFile(){
  const filename=$('editor-select').value||'dataset.js';
  const content=$('editor-area').value;
  if(!content){setLog('log-editor','✗ Editor kosong.','err');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/javascript'}));
  a.download=filename;
  a.click();
}

async function deleteFile(){
  readCfg();
  const filename=$('editor-select').value;
  if(!filename){setLog('log-editor','✗ Pilih file terlebih dahulu.','err');return;}
  if(!confirm('Hapus '+filename+'? Manifest juga akan diperbarui.')) return;
  await doDelete(filename,'log-editor');
}

async function quickDelete(filename){
  readCfg();
  if(!confirm('Hapus '+filename+'?')) return;
  await doDelete(filename,'log-files');
}

async function doDelete(filename,logId){
  if(!shas[filename]){
    setLog(logId,'SHA tidak ditemukan, refresh file list dulu.','err');return;
  }
  setLog(logId,'Menghapus '+filename+'...','info');
  try{
    await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+cfg.path+'/'+filename,'DELETE',{
      message:'chore: hapus '+filename,sha:shas[filename],branch:cfg.branch
    });
    const key=filename.replace('.js','');
    manifestKeys=manifestKeys.filter(k=>k!==key);
    await updateManifest('chore: hapus '+key+' dari manifest');
    delete shas[filename];
    $('editor-area').value='';
    $('editor-select').value='';
    setLog(logId,'✓ '+filename+' dihapus & manifest diperbarui.','ok');
    renderManifestChips();
    await fetchFileList();
  }catch(e){setLog(logId,'✗ '+e.message,'err');}
}
</script>
